spring.application.name=TransactionPlatform

# Default active profile for local development. Can be overridden by SPRING_PROFILES_ACTIVE env or -Dspring.profiles.active
spring.profiles.active=local

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/payment_db
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Sets a fixed username and password for your Spring Security login
spring.security.user.name=admin
spring.security.user.password=pune123

spring.jpa.properties.hibernate.format_sql=true

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# Ensures the producer waits for a "received" signal from Kafka
spring.kafka.producer.acks=all

# Management / Actuator
management.endpoints.web.exposure.include=health,info,prometheus,loggers
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Local dev: we log to console only. Do not enable file logging or actuator logfile here.
# When deployed to container/cloud, set management.endpoint.logfile.external-file=/proc/1/fd/1
# via an environment-specific properties file or environment variables.

