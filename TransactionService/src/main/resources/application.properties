spring.application.name=TransactionPlatform

# Default active profile for local development. Can be overridden by SPRING_PROFILES_ACTIVE env or -Dspring.profiles.active
spring.profiles.active=local

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/payment_db
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Sets a fixed username and password for your Spring Security login
spring.security.user.name=admin
spring.security.user.password=pune123

spring.jpa.properties.hibernate.format_sql=true

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# Ensures the producer waits for a "received" signal from Kafka
spring.kafka.producer.acks=all

# Management / Actuator
management.endpoints.web.exposure.include=health,info,prometheus,loggers,logfile
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Enable actuator logfile endpoint to return application log contents (dev only)
management.endpoint.logfile.enabled=true

# Ensure actuator logfile can find the file (used by /actuator/logfile)
# Keep in sync with logback FILE appender path
logging.file.name=./logs/transactionservice.log

# If the app is started from a different working directory (IDE or mvn from repo root)
# actuator may not locate the relative path. Set an explicit external-file path that points
# to the actual file location on the developer machine so /actuator/logfile can return it.
# Update this path if you run the JVM from a different folder.
management.endpoint.logfile.external-file=E:/payment-gateway/logs/transactionservice.log

