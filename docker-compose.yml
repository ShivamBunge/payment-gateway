services:
  transactionservice:
    build:
      # Use the repository root as the build context so the Maven multi-module parent POM is available
      context: .
      dockerfile: TransactionService/Dockerfile
    image: transactionservice:local
    environment:
      - SPRING_PROFILES_ACTIVE=json
      # Expose logs from container to host so you can inspect JSON logs locally
      - LOG_PATH=/app/logs
      # Use the userservice hostname inside the compose network (container port remains 8082)
      - user.service.base-url=http://userservice:8082
      # Override datasource and other services so the container resolves service hostnames in this compose network
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payment_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_LOGGING_LEVEL_COM_PAYMENT_GATEWAY_TRANSACTIONPLATFORM_CLIENT=DEBUG
    volumes:
      - ./TransactionService/logs:/app/logs
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      # Map container 8080 to host 8081 to avoid conflicts on developer machines; change to "8080:8080" if you prefer.
      - "8081:8080"
  postgres:
    image: postgres:15-alpine
    container_name: payment_db
    environment:
      - POSTGRES_DB=payment_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - TZ=UTC                  # Force container system time to UTC
      - PGTZ=UTC                # Force Postgres internal timezone to UTC
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # ✅ REQUIRED (missing in your config)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

      # ✅ Already present but keep it
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  userservice:
    build:
      # Use the repository root as the build context so the Maven multi-module parent POM is available
      context: .
      dockerfile: UserService/Dockerfile
    image: userservice:local
    ports:
      # Host port changed to 8083 to avoid conflicts on developer machines where 8082 may be occupied.
      # If you prefer to keep 8082, revert to "8082:8082" or stop the local process using 8082.
      - "8083:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      # Override datasource so the container connects to the Postgres service in this compose network
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/user_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - postgres
